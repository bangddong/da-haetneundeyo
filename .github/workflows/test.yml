name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test
      - name: sweep smoke (빈 환경에서 CLI가 조용히 성공하는지)
        run: node scripts/journal-cli.mjs sweep
        env:
          DHND_DATA_DIR: ${{ runner.temp }}/dhnd-smoke
